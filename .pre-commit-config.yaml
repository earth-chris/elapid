default_language_version:
  python: python3.11

repos:
  # ruff is installed in the pixi `dev` env (see `[tool.pixi.feature.lint]`),
  # so run that binary instead of letting pre-commit fetch a second pinned copy.
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        entry: ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        exclude: recipe/meta.yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: requirements-txt-fixer
